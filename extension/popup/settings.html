<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NovelApp Settings</title>
  <link rel="stylesheet" href="popup.css" />
  <style>
    body {
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
    }
    h1 {
      font-size: 18px;
      margin-top: 0;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 14px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-secondary);
      color: var(--text);
      font-size: 14px;
      box-sizing: border-box;
    }
    .button-group {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn-save {
      background: var(--accent);
      color: white;
    }
    .btn-save:hover {
      opacity: 0.9;
    }
    .btn-reset {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-reset:hover {
      background: var(--bg-secondary);
    }
    .status-message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 4px;
      display: none;
      font-size: 14px;
    }
    .status-success {
      background: rgba(76, 175, 80, 0.1);
      color: #4caf50;
      display: block;
    }
    .status-error {
      background: rgba(244, 67, 54, 0.1);
      color: #f44336;
      display: block;
    }
    .help-text {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>📚 NovelApp Settings</h1>

    <div class="form-group">
      <label for="app-url">Server URL</label>
      <input
        type="text"
        id="app-url"
        placeholder="http://localhost:3000 or https://novels.example.com"
      />
      <div class="help-text">
        Enter the URL where NovelApp is running. This can be localhost for development or a domain for a remote server.
      </div>
    </div>

    <div class="button-group">
      <button class="btn-reset" id="reset-btn">Reset to Default</button>
      <button class="btn-save" id="save-btn">Save</button>
    </div>

    <div class="form-group">
      <label for="api-key">API Key</label>
      <input type="password" id="api-key" placeholder="Optional API Key / AUTH_SECRET" />
      <div class="help-text">Optional API key used by the browser extension and Android app. Leave empty to disable.</div>
    </div>

    <div class="status-message" id="status-message"></div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
