name: Build and Push to Docker Hub

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows:
      - Create Release Tag
    types:
      - completed

jobs:
  build-and-push:
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            version="${GITHUB_REF#refs/tags/}"
          else
            git fetch --force --tags
            version=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" "v*" | sort -V | tail -n 1)
          fi

          if [[ -z "$version" ]]; then
            echo "No release tag found for this workflow run." >&2
            exit 1
          fi

          echo "VERSION=$version" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/novelapp:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/novelapp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
